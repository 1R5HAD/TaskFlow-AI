<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up — TaskFlow AI</title>
  <script>
    (function() {
      const savedTheme = localStorage.getItem('theme') || 'dark';
      document.documentElement.setAttribute('data-theme', savedTheme);
    })();
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #080808; --s1: #111; --s2: #181818;
      --b1: rgba(255,255,255,0.06); --b2: rgba(255,255,255,0.11);
      --text: #f0f0f0; --muted: #444; --muted2: #777;
      --teal: #00d4aa; --teal2: #00ffcc; --tdim: rgba(0,212,170,0.08);
      --high: #ff4d6d; --good: #00d4aa; --r: 12px; --r2: 8px;
      --shadow: none;
    }
    :root[data-theme="light"] {
      --bg: #f8fafc; --s1: #ffffff; --s2: #f1f5f9;
      --b1: rgba(15, 23, 42, 0.06); --b2: rgba(15, 23, 42, 0.12);
      --text: #0f172a; --muted: #94a3b8; --muted2: #64748b;
      --teal: #0d9488; --teal2: #0f766e; --tdim: rgba(13, 148, 136, 0.08);
      --high: #e11d48; --good: #0d9488; --r: 12px; --r2: 8px;
      --shadow: 0 4px 12px rgba(15, 23, 42, 0.03), 0 1px 3px rgba(15, 23, 42, 0.02);
    }
    body {
      font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    body::before {
      content: ''; position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(0,212,170,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,170,0.03) 1px, transparent 1px);
      background-size: 40px 40px; pointer-events: none;
    }

    .card {
      position: relative; z-index: 1;
      background: var(--s1); border: 1px solid var(--b2);
      border-radius: var(--r); padding: 40px 36px;
      width: 100%; max-width: 400px;
      animation: rise 0.4s cubic-bezier(0.4,0,0.2,1) both;
      box-shadow: var(--shadow);
    }
    .card::before {
      content: ''; position: absolute; top: -1px; left: 20%; right: 20%;
      height: 1px; background: var(--teal); border-radius: 99px; opacity: 0.6;
    }
    @keyframes rise { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: none; } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    /* ── THEME TOGGLE ── */
    .theme-btn-card {
      position: absolute;
      top: 16px;
      right: 16px;
      background: transparent;
      border: 1px solid var(--b1);
      color: var(--muted2);
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .theme-btn-card:hover {
      border-color: var(--teal);
      color: var(--teal);
      background: var(--s2);
    }
    .sun-icon { display: block; }
    .moon-icon { display: none; }
    [data-theme="light"] .sun-icon { display: none; }
    [data-theme="light"] .moon-icon { display: block; }

    .logo { text-align: center; margin-bottom: 32px; }
    .logo h1 { font-size: 1.8rem; font-weight: 700; letter-spacing: -0.5px; }
    .logo h1 em { color: var(--teal); font-style: normal; }
    .logo p { font-size: 12px; color: var(--muted2); margin-top: 5px; }

    .flash {
      background: rgba(255,77,109,0.08); border: 1px solid rgba(255,77,109,0.2);
      color: var(--high); border-radius: var(--r2); padding: 9px 13px;
      font-size: 12px; margin-bottom: 20px; animation: fadeIn 0.2s ease both;
    }

    .field { margin-bottom: 16px; }
    label {
      display: block; font-size: 10px; font-weight: 600; color: var(--muted2);
      text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px;
    }
    input {
      width: 100%; background: var(--s2); border: 1px solid var(--b1);
      border-radius: var(--r2); color: var(--text);
      font-family: 'Inter', sans-serif; font-size: 14px;
      padding: 11px 14px; outline: none; transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus { border-color: var(--teal); box-shadow: 0 0 0 3px rgba(0,212,170,0.08); }
    input::placeholder { color: var(--muted); }

    /* Password strength bar */
    .pw-wrap { position: relative; }
    .pw-wrap input { padding-right: 42px; }
    .pw-toggle {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--muted2); cursor: pointer;
      font-size: 11px; font-weight: 500; padding: 2px 4px; transition: color 0.15s;
    }
    .pw-toggle:hover { color: var(--teal); }

    .strength-bar {
      height: 2px; background: var(--b1); border-radius: 99px;
      margin-top: 7px; overflow: hidden;
    }
    .strength-fill {
      height: 100%; width: 0; border-radius: 99px;
      transition: width 0.3s ease, background 0.3s ease;
    }
    .strength-label {
      font-size: 10px; margin-top: 4px; height: 14px;
      transition: color 0.2s;
    }

    /* Field validation indicators */
    input.valid   { border-color: rgba(0,212,170,0.4); }
    input.invalid { border-color: rgba(255,77,109,0.4); }

    .hint { font-size: 10px; color: var(--muted2); margin-top: 5px; }

    .btn {
      width: 100%; padding: 12px; background: var(--teal); color: #080808;
      border: none; border-radius: var(--r2);
      font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 700;
      cursor: pointer; letter-spacing: 0.3px; margin-top: 6px;
      transition: background 0.15s, transform 0.1s, opacity 0.2s;
    }
    .btn:hover { background: var(--teal2); }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .footer { text-align: center; margin-top: 22px; font-size: 12px; color: var(--muted2); }
    .footer a { color: var(--teal); text-decoration: none; font-weight: 500; }
    .footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
<div class="card">
  <button id="theme-toggle" class="theme-btn-card" title="Toggle Theme" type="button">
    <!-- Sun icon (shows in dark mode) -->
    <svg class="sun-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    <!-- Moon icon (shows in light mode) -->
    <svg class="moon-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
  </button>
  <div class="logo">
    <h1>Task<em>Flow</em> AI</h1>
    <p>Create your account</p>
  </div>

  {% with messages = get_flashed_messages() %}
    {% if messages %}
      <div class="flash">{{ messages[0] }}</div>
    {% endif %}
  {% endwith %}

  <form method="POST" action="/signup" id="signup-form">

    <div class="field">
      <label for="username">Username</label>
      <input type="text" id="username" name="username"
             placeholder="choose a username" autocomplete="username"
             required minlength="3"
             oninput="validateField(this, this.value.length >= 3)" />
    </div>

    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" name="email"
             placeholder="you@example.com" autocomplete="email"
             required
             oninput="validateField(this, /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(this.value))" />
    </div>

    <div class="field">
      <label for="password">Password</label>
      <div class="pw-wrap">
        <input type="password" id="password" name="password"
               placeholder="min. 6 characters" autocomplete="new-password"
               required minlength="6"
               oninput="checkStrength(this.value)" />
        <button type="button" class="pw-toggle" onclick="togglePw('password', this)">show</button>
      </div>
      <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
      <div class="strength-label" id="strength-label"></div>
    </div>

    <button type="submit" class="btn" id="submit-btn">Create Account →</button>
  </form>

  <div class="footer">
    Already have an account? <a href="/login">Sign in</a>
  </div>
</div>

<script>
// ── Password show/hide ─────────────────────────────────────
function togglePw(id, btn) {
  const inp = document.getElementById(id);
  const show = inp.type === 'password';
  inp.type = show ? 'text' : 'password';
  btn.textContent = show ? 'hide' : 'show';
}

// ── Field validation indicator ─────────────────────────────
function validateField(inp, isValid) {
  inp.classList.toggle('valid',   isValid && inp.value.length > 0);
  inp.classList.toggle('invalid', !isValid && inp.value.length > 0);
}

// ── Password strength meter ────────────────────────────────
function checkStrength(val) {
  const fill  = document.getElementById('strength-fill');
  const label = document.getElementById('strength-label');
  const inp   = document.getElementById('password');

  let score = 0;
  if (val.length >= 6)  score++;
  if (val.length >= 10) score++;
  if (/[A-Z]/.test(val)) score++;
  if (/[0-9]/.test(val)) score++;
  if (/[^A-Za-z0-9]/.test(val)) score++;

  const levels = [
    { pct: '0%',   color: 'transparent', text: '',           textColor: '' },
    { pct: '25%',  color: '#ff4d6d',     text: 'Weak',       textColor: '#ff4d6d' },
    { pct: '50%',  color: '#ffb347',     text: 'Fair',       textColor: '#ffb347' },
    { pct: '75%',  color: '#00d4aa',     text: 'Good',       textColor: '#00d4aa' },
    { pct: '90%',  color: '#00d4aa',     text: 'Strong',     textColor: '#00d4aa' },
    { pct: '100%', color: '#00ffcc',     text: 'Very strong', textColor: '#00ffcc' },
  ];

  const lvl = levels[Math.min(score, 5)];
  fill.style.width      = val.length === 0 ? '0%' : lvl.pct;
  fill.style.background = lvl.color;
  label.textContent  = val.length === 0 ? '' : lvl.text;
  label.style.color  = lvl.textColor;

  validateField(inp, val.length >= 6);
}

// ── Theme toggle logic ──────────────────────────────────────
const toggleBtn = document.getElementById('theme-toggle');
if (toggleBtn) {
  toggleBtn.addEventListener('click', () => {
    const currentTheme = document.documentElement.getAttribute('data-theme') || 'dark';
    const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', newTheme);
    localStorage.setItem('theme', newTheme);
  });
}
</script>
</body>
</html>
